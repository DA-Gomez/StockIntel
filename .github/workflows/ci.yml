# ci pipeline. this file allows for GitHub to watch
# the repo for push and PR events and runs the workflow on a fresh Ubuntu VM each time
name: CI

on: # triggers define when the workflow runs (in this case, every push/pr to main)
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs: #test' and 'docker' run on Ubuntu VMs. uses Testcontainers automatically
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test # needs test means itll only run if the tests passed
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: stockintel-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max